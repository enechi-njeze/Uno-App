# Render Blueprint — provisions the whole Unö stack from this repo in one go:
#   • uno-db   : managed PostgreSQL (PostGIS enabled by the first migration)
#   • uno-api  : the NestJS backend (migrations run on boot; seeds demo data)
#   • uno-web  : the Expo web build (static site) — the clickable URL
#
# In Render: New → Blueprint → connect this repo. Render reads this file.
# After the first deploy, set uno-web's EXPO_PUBLIC_API_URL to the API URL
# (shown on the uno-api service) as https://<uno-api-host>/api/v1, then redeploy.
databases:
  - name: uno-db
    plan: free
    postgresMajorVersion: "16"

services:
  # ---- Backend API ----
  - type: web
    name: uno-api
    runtime: node
    plan: free
    rootDir: apps/api
    # NODE_ENV=production makes npm skip devDependencies, but the build needs
    # them (@nestjs/cli, typescript). Force them in for the build; the runtime
    # (node dist/main.js) doesn't need them.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/v1/health
    # Backend served at the api subdomain of the live domain.
    domains:
      - api.myunoapp.com
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uno-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Locked to the live web origins now that the app has its own domain.
      - key: CORS_ORIGINS
        value: "https://myunoapp.com,https://www.myunoapp.com"
      - key: SEARCH_DRIVER
        value: postgres
      - key: SEED_ON_BOOT
        value: "true"
      # PUBLIC_BASE_URL is derived from RENDER_EXTERNAL_URL automatically.

  # ---- Web app (static) ----
  - type: web
    name: uno-web
    runtime: static
    rootDir: apps/mobile
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    # Canonical public home (apex). Render auto-creates a www.myunoapp.com
    # custom domain that 301-redirects to the apex (Render terminates TLS and
    # handles the redirect), so in DNS www is just a CNAME to this service.
    domains:
      - myunoapp.com
    envVars:
      # Web build talks to the API on its own subdomain.
      - key: EXPO_PUBLIC_API_URL
        value: "https://api.myunoapp.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
